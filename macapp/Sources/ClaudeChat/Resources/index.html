<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>ClaudeChat</title>
<style>
:root{--bg:#0d0d15;--card:#1a1a2e;--accent:#7c3aed;--text:#e0e0e0;--muted:#6b7280;--user-bg:rgba(124,58,237,.12);--claude-bg:#1a1a2e;--border:rgba(255,255,255,.06);--code-bg:#222;--danger:#ef4444;--success:#22c55e;--warn:#f59e0b}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;-webkit-tap-highlight-color:transparent}

/* LOGIN */
.login{display:flex;align-items:center;justify-content:center;height:100vh;padding:2rem}
.login .box{text-align:center;max-width:320px;width:100%}
.login .icon{font-size:3rem;margin-bottom:.5rem}
.login h1{font-size:1.4rem;font-weight:700;color:var(--accent);margin-bottom:.3rem}
.login p{font-size:.8rem;color:var(--muted);margin-bottom:1.5rem}
.login input{display:block;width:100%;padding:14px 16px;border-radius:14px;border:1px solid var(--border);background:var(--card);color:var(--text);text-align:center;font-size:1.1rem;letter-spacing:.4em;outline:none;font-family:monospace}
.login input:focus{border-color:var(--accent)}
.login button{width:100%;padding:14px;margin-top:1rem;border-radius:14px;background:var(--accent);color:#fff;font-size:1rem;font-weight:600;border:none;cursor:pointer}
.login button:active{opacity:.85}
.login .err{color:var(--danger);font-size:.78rem;margin-top:.6rem}

/* CHAT */
.chat{display:none;flex-direction:column;height:100vh}
.header{display:flex;align-items:center;padding:12px 16px;background:rgba(0,0,0,.3);border-bottom:1px solid var(--border);gap:10px;flex-shrink:0}
.header button{background:none;border:none;color:var(--muted);font-size:1.2rem;cursor:pointer;padding:4px}
.header .title{font-size:.85rem;font-weight:600;color:var(--text);flex:1;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.header .logout{font-size:.75rem;color:var(--muted)}
.msgs{flex:1;overflow-y:auto;padding:12px;-webkit-overflow-scrolling:touch}
.msgs .bubble-row{display:flex;gap:8px;margin-bottom:14px;animation:fadeIn .2s ease}
.msgs .bubble-row.user{flex-direction:row-reverse}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0}
.av.user{background:var(--user-bg)}
.av.claude{background:rgba(249,115,22,.15)}
.bubble{max-width:82%}
.bubble .meta{display:flex;gap:8px;margin-bottom:4px;padding:0 2px}
.bubble .meta .role{font-size:.7rem;font-weight:600}
.bubble .meta .role.user{color:#8b5cf6}
.bubble .meta .role.claude{color:#fb923c}
.bubble .meta .time{font-size:.62rem;color:var(--muted)}
.bubble .body{padding:10px 13px;border-radius:16px;font-size:.85rem;line-height:1.55}
.bubble .body.user{background:var(--user-bg);border:1px solid rgba(124,58,237,.15);border-bottom-right-radius:4px}
.bubble .body.claude{background:var(--claude-bg);border:1px solid var(--border);border-bottom-left-radius:4px}

/* CODE BLOCKS */
.bubble .body pre{background:#0a0a14;border-radius:10px;padding:12px;margin:8px 0;overflow-x:auto;font-size:.75rem;line-height:1.5;font-family:'SF Mono',Menlo,monospace;position:relative;border:1px solid var(--border)}
.bubble .body pre .lang{position:absolute;top:6px;right:6px;font-size:.62rem;color:var(--muted);background:rgba(0,0,0,.4);padding:2px 8px;border-radius:10px}
.bubble .body code{background:var(--code-bg);padding:2px 6px;border-radius:5px;font-size:.8rem;font-family:'SF Mono',Menlo,monospace}
.bubble .body pre code{background:none;padding:0;font-size:inherit}
.bubble .body strong{font-weight:600;color:#fff}
.bubble .body em{font-style:italic}

/* TOOLS */
.bubble .body .tool{font-size:.72rem;padding:6px 10px;border-radius:8px;margin:4px 0;display:flex;align-items:center;gap:6px}
.bubble .body .tool.use{background:rgba(59,130,246,.1);color:#60a5fa;border:1px solid rgba(59,130,246,.15)}
.bubble .body .tool.ok{background:rgba(34,197,94,.1);color:var(--success);border:1px solid rgba(34,197,94,.15)}
.bubble .body .tool.err{background:rgba(239,68,68,.1);color:var(--danger);border:1px solid rgba(239,68,68,.15)}
.bubble .body .thinking{font-size:.72rem;color:var(--muted);font-style:italic;padding:4px 0;display:flex;align-items:center;gap:4px}

/* TABLE */
.bubble .body table{border-collapse:collapse;width:100%;margin:8px 0;font-size:.75rem}
.bubble .body th{background:rgba(124,58,237,.12);color:var(--accent);padding:6px 10px;text-align:left;font-weight:600;border:1px solid var(--border)}
.bubble .body td{padding:6px 10px;border:1px solid var(--border)}
.bubble .body tr:nth-child(even) td{background:rgba(255,255,255,.02)}

/* INPUT */
.input-bar{display:flex;gap:8px;padding:10px 14px;background:rgba(0,0,0,.3);border-top:1px solid var(--border);align-items:flex-end;flex-shrink:0;padding-bottom:max(10px,env(safe-area-inset-bottom))}
.input-bar textarea{flex:1;background:var(--card);border:1px solid var(--border);border-radius:18px;padding:10px 15px;color:var(--text);font-size:.88rem;resize:none;outline:none;line-height:1.4;font-family:inherit}
.input-bar textarea:focus{border-color:var(--accent)}
.input-bar button{width:40px;height:40px;border-radius:50%;background:var(--accent);border:none;color:#fff;font-size:1.1rem;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s}
.input-bar button:active{transform:scale(.92);opacity:.9}
.loading{color:var(--muted);font-size:.78rem;display:flex;align-items:center;gap:4px;padding:4px 0;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* SESSION LIST */
.slist{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:20;overflow-y:auto}
.slist .head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border)}
.slist .head button{background:none;border:none;color:var(--muted);font-size:1.3rem;cursor:pointer}
.slist .head span{font-size:.85rem;font-weight:600}
.slist .sess{background:var(--card);border-radius:12px;padding:14px;margin:6px 14px;cursor:pointer;border:1px solid var(--border)}
.slist .sess:active{background:rgba(124,58,237,.08)}
.slist .sess .nm{font-size:.88rem;font-weight:500}
.slist .sess .sub{font-size:.72rem;color:var(--muted);margin-top:3px}
</style>
</head>
<body>

<div id="loginScreen" class="login">
  <div class="box">
    <div class="icon">🤖</div>
    <h1>ClaudeChat</h1>
    <p>输入邀请码访问 Claude 对话</p>
    <input id="codeInput" type="text" maxlength="8" placeholder="邀请码" autocomplete="off" autocapitalize="characters">
    <button onclick="doLogin()">登录</button>
    <div id="loginError" class="err" style="display:none"></div>
  </div>
</div>

<div id="chatScreen" class="chat">
  <div class="header">
    <button onclick="toggleSessions()">☰</button>
    <span id="curSessionName" class="title">选择会话</span>
    <button onclick="doLogout()" class="logout">退出</button>
  </div>
  <div id="sessionsList" class="slist">
    <div class="head"><span>会话列表</span><button onclick="toggleSessions()">✕</button></div>
    <div id="sessionsContent"></div>
  </div>
  <div id="messagesBox" class="msgs"></div>
  <div class="input-bar">
    <textarea id="msgInput" rows="1" placeholder="输入消息…" oninput="this.style.height='';this.style.height=Math.min(this.scrollHeight,100)+'px'"></textarea>
    <button onclick="doSend()">↑</button>
  </div>
</div>

<script>
let token=localStorage.getItem('cctok'),currentSid=null,pollTimer=null;
if(token){showChat();loadSessions()}

async function doLogin(){
  const code=document.getElementById('codeInput').value.trim().toUpperCase();
  if(!code||code.length<4){showErr('请输入完整邀请码');return}
  const btn=document.querySelector('#loginScreen button');btn.textContent='验证中…';btn.disabled=true;
  try{
    const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code})});
    const d=await r.json();
    if(d.token){token=d.token;localStorage.setItem('cctok',token);showChat();loadSessions()}
    else{showErr(d.error||'邀请码无效');btn.textContent='登录';btn.disabled=false}
  }catch(e){showErr('连接失败');btn.textContent='登录';btn.disabled=false}
}

function showErr(m){const e=document.getElementById('loginError');e.textContent=m;e.style.display='block'}
function showChat(){document.getElementById('loginScreen').style.display='none';document.getElementById('chatScreen').style.display='flex'}

async function loadSessions(){
  try{
    const r=await fetch('/api/sessions',{headers:auth()});const ss=await r.json();
    const c=document.getElementById('sessionsContent');
    c.innerHTML=ss.length?ss.map(s=>'<div class="sess" onclick="selectSession(\''+s.id+'\',\''+esc(s.name)+'\')"><div class="nm">'+esc(s.name)+'</div><div class="sub">'+esc(s.workingDirectory)+' · '+fmtDate(s.lastMessageAt)+'</div></div>').join(''):'<p style="color:var(--muted);font-size:.83rem;text-align:center;padding:2rem">没有会话</p>'
  }catch(e){}
}

function toggleSessions(){
  const el=document.getElementById('sessionsList');
  el.style.display=el.style.display==='block'?'none':'block';
  if(el.style.display==='block')loadSessions();
}

async function selectSession(id,name){
  currentSid=id;document.getElementById('curSessionName').textContent=name;
  document.getElementById('sessionsList').style.display='none';
  try{const r=await fetch('/api/sessions/'+id+'/messages',{headers:auth()});const ms=await r.json();renderMsgs(ms)}catch(e){}
}

function renderMsgs(msgs){
  let html='';
  for(let i=0;i<msgs.length;i++)html+=renderOne(msgs[i]);
  document.getElementById('messagesBox').innerHTML=html;scrollDown();
}

function renderOne(m){
  const u=m.role==='user',av=u?'👤':'✨';
  const time=new Date(m.timestamp*1e3).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
  let cts='';
  for(let j=0;j<(m.contents||[]).length;j++){
    const c=m.contents[j];
    if(c.type==='text')cts+=renderMD(c.text);
    else if(c.type==='tool_use')cts+='<div class="tool use">🔧 '+esc(c.name)+'</div>';
    else if(c.type==='tool_result')cts+='<div class="tool '+(c.isError?'err':'ok')+'">'+(c.isError?'❌':'✅')+' '+esc((c.content||'').slice(0,120))+'</div>';
    else if(c.type==='thinking')cts+='<div class="thinking">🧠 '+esc((c.text||'').slice(0,80))+'</div>';
  }
  return '<div class="bubble-row'+(u?' user':'')+'">'
    +'<div class="av'+(u?' user':' claude')+'">'+av+'</div>'
    +'<div class="bubble">'
    +'<div class="meta"><span class="role'+(u?' user':' claude')+'">'+(u?'你':'Claude')+'</span><span class="time">'+time+'</span></div>'
    +'<div class="body'+(u?' user':' claude')+'">'+(cts||'<div class="loading">● 思考中…</div>')+'</div>'
    +'</div></div>';
}

function renderMD(t){
  if(!t)return'';
  let s=esc(t);
  // Tables: | col1 | col2 |\n|---|---|
  s=s.replace(/(\|[^\n]+\|\n\|[-: |]+\|\n(?:\|[^\n]+\|\n)*)/g,function(m){
    const lines=m.trim().split('\n').filter(l=>l.includes('|')&&!l.match(/^\|[-: |]+\|$/));
    const heads=parseRow(lines[0]),rows=lines.slice(1).map(parseRow);
    let html='<table><thead><tr>';
    heads.forEach(h=>html+='<th>'+h+'</th>');
    html+='</tr></thead><tbody>';
    rows.forEach(r=>{html+='<tr>';r.forEach(c=>html+='<td>'+c+'</td>');html+='</tr>'});
    html+='</tbody></table>';
    return html;
  });
  // Code blocks: ```lang\n...\n```
  s=s.replace(/```(\w*)\n([\s\S]*?)```/g,function(_,lang,code){
    var l=lang||'';
    return '<pre>'+(l?'<span class="lang">'+esc(l)+'</span>':'')+'<code>'+esc(code.trimEnd())+'</code></pre>';
  });
  // Inline code
  s=s.replace(/`([^`]+)`/g,'<code>$1</code>');
  // Bold & italic
  s=s.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
  s=s.replace(/\*([^*]+)\*/g,'<em>$1</em>');
  // Line breaks
  s=s.replace(/\n/g,'<br>');
  return s;
}

function parseRow(line){return line.replace(/^\||\|$/g,'').split('|').map(c=>c.trim())}

async function doSend(){
  const inp=document.getElementById('msgInput'),text=inp.value.trim();
  if(!text||!currentSid)return;
  document.getElementById('messagesBox').innerHTML+=renderOne({role:'user',contents:[{type:'text',text}],timestamp:Date.now()/1e3});
  document.getElementById('messagesBox').innerHTML+='<div class="loading">● 思考中…</div>';
  scrollDown();inp.value='';inp.style.height='';
  try{
    const r=await fetch('/api/sessions/'+currentSid+'/send',{method:'POST',headers:Object.assign(auth(),{'Content-Type':'application/json'}),body:JSON.stringify({message:text})});
    const d=await r.json();if(d.streamId)startPoll(d.streamId);
  }catch(e){}
}

function startPoll(sid){
  if(pollTimer)clearInterval(pollTimer);
  pollTimer=setInterval(async()=>{
    try{
      const r=await fetch('/api/stream/'+sid,{headers:auth()});const d=await r.json();
      const bubbles=document.querySelectorAll('#messagesBox .bubble');
      if(!bubbles.length)return;
      const body=bubbles[bubbles.length-1].querySelector('.body');
      if(!body)return;
      // Render structured contents
      let html='';
      for(let j=0;j<(d.contents||[]).length;j++){
        const c=d.contents[j];
        if(c.type==='text')html+=renderMD(c.text||'');
        else if(c.type==='tool_use')html+='<div class="tool use">&#x1f527; '+esc(c.name||'')+'</div>';
        else if(c.type==='tool_result')html+='<div class="tool '+(c.isError?'err':'ok')+'">'+(c.isError?'&#x274c;':'&#x2705;')+' '+esc((c.content||'').slice(0,120))+'</div>';
        else if(c.type==='thinking')html+='<div class="thinking">&#x1f9e0; '+esc((c.text||'').slice(0,80))+'</div>';
      }
      if(!html&&!d.isComplete)html='<div class="loading">● 思考中…</div>';
      body.innerHTML=html;
      if(d.isComplete){clearInterval(pollTimer);pollTimer=null;scrollDown()}
    }catch(e){}
  },800)
}

function auth(){return token?{Authorization:'Bearer '+token}:{}}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmtDate(ts){const d=new Date(ts*1e3);return(d.getMonth()+1)+'月'+d.getDate()+'日 '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')}
function scrollDown(){setTimeout(()=>{const e=document.getElementById('messagesBox');if(e)e.scrollTop=e.scrollHeight},50)}
function doLogout(){localStorage.removeItem('cctok');location.reload()}
</script>
</body>
</html>
